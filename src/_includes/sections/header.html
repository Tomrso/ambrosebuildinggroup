<!--                 Navigation                   -->
<!-- ============================================ -->

<header id="cs-navigation">
    <div class="cs-top-bar">
        <div class="cs-top-container">
            <div class="cs-top-contact">
                <a href="tel:{{ client.phoneForTel }}" class="cs-top-link">
                    <img class="cs-link-icon" src="/assets/images/icons/call.png" alt="call icon" width="16" height="16" aria-hidden="true" decoding="async">
                    {{ client.phoneFormatted }}
                </a>
                <a href="mailto:{{ client.email }}" class="cs-top-link">
                    <img class="cs-link-icon" src="/assets/images/icons/mail.png" alt="mail icon" width="20" height="20" aria-hidden="true" decoding="async">
                    {{ client.email }}
                </a>
            </div>
            <div class="cs-top-social">
                <a href="{{ client.socials.facebook }}" class="cs-social-link" target="_blank">
                    <img class="cs-social-icon" src="/assets/images/icons/facebook.png" alt="logo" width="12" height="12" aria-hidden="true" decoding="async">
                </a>
                <a href="{{ client.socials.instagram }}" class="cs-social-link" target="_blank">
                    <img class="cs-social-icon" src="/assets/images/icons/instagram.png" alt="logo" width="12" height="12" aria-hidden="true" decoding="async">
                </a>
            </div>
        </div>
    </div>
    <div class="cs-container">
        <!--Nav Logo-->
        <a href="/" class="cs-logo" aria-label="back to home">
            <img src="/assets/images/logo.png" alt="Tomic Painting logo" width="197" height="43" aria-hidden="true" decoding="async">
        </a>
        <!--Navigation List-->
        <nav class="cs-nav" role="navigation">
            <!--Mobile Nav Toggle-->
            <button class="cs-toggle" aria-label="mobile menu toggle">
                <div class="cs-box" aria-hidden="true">
                    <span class="cs-line cs-line1" aria-hidden="true"></span>
                    <span class="cs-line cs-line2" aria-hidden="true"></span>
                    <span class="cs-line cs-line3" aria-hidden="true"></span>
                </div>
            </button>
            <!-- We need a wrapper div so we can set a fixed height on the cs-ul in case the nav list gets too long from too many dropdowns being opened and needs to have an overflow scroll. This wrapper acts as the background so it can go the full height of the screen and not cut off any overflowing nav items while the cs-ul stops short of the bottom of the screen, which keeps all nav items in view no matter how mnay there are-->
            <div class="cs-ul-wrapper" id="cs-ul-wrapper">
                <ul id="cs-expanded" class="cs-ul">
                    <li class="cs-li">
                        <a href="/" class="cs-li-link {% if page.url == "/" %} cs-active {% endif %}" {% if page.url == "/" %} aria-current="page" {% endif %}>
                            Home
                        </a>
                    </li>
                    <li class="cs-li cs-dropdown">
                        <div class="cs-li-link cs-dropdown-toggle {% if page.url == "/interior/" or page.url == "/exterior/" or page.url == "/renovations/"  %} cs-active {% endif %}" aria-haspopup="menu" aria-expanded="false" id="services-dropdown-toggle">
                            Services
                            <img class="cs-drop-icon" src="/assets/images/icons/dropdown.png" alt="" width="15" height="15" decoding="async" aria-hidden="true">
                        </div>
                        <ul class="cs-drop-ul" aria-labelledby="projects-dropdown-toggle">
                            <li class="cs-drop-li">
                                <a href="/interior/" class="cs-li-link cs-drop-link">Interior Painting</a>
                            </li>
                            <li class="cs-drop-li">
                                <a href="/exterior/" class="cs-li-link cs-drop-link">Exterior Painting</a>
                            </li>
                            <li class="cs-drop-li">
                                <a href="/renovations/" class="cs-li-link cs-drop-link">Renovations & Repainting</a>
                            </li>
                        </ul>
                    </li>
                    <!-- Note: When copying this dropdown, update the id attribute with an appropriate name (e.g., "services-dropdown-toggle", "products-dropdown-toggle") and ensure the aria-labelledby attribute on the ul matches the button's id -->
                    <!--Copy and paste this cs-dropdown list item and replace any .cs-li with this cs-dropdown group to make a new dropdown and it will work-->
                </ul>
            </div>
        </nav>
        <a href="/contact" class="cs-button-solid cs-nav-button">Contact Us</a>
    </div>
</header>
